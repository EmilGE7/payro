{% extends "base.html" %}
{% block title %}Executive Login{% endblock %}

{% block auth_content %}
<div class="login-container fadeInUp">
    <div class="login-card glass aurora-hover" style="background: rgba(22, 22, 28, 0.6); box-shadow: 0 20px 40px rgba(0,0,0,0.5); border-radius: 32px; border: 1px solid var(--glass-border); border-top: 1px solid rgba(255,255,255,0.15);">
        <!-- Brand Header -->
        <div style="text-align: center; margin-bottom: 3.5rem;">
            <div style="display: inline-flex; margin-bottom: 1.5rem; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); border-radius: 16px;">
                <svg width="64" height="64" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="32" height="32" rx="8" fill="url(#logo_paint_l)"/>
                    <path d="M11 10C11 9.44772 11.4477 9 12 9H17C19.7614 9 22 11.2386 22 14C22 16.7614 19.7614 19 17 19H14V22.5C14 22.7761 13.7761 23 13.5 23H11.5C11.2239 23 11 22.7761 11 22.5V10Z" fill="white"/>
                    <circle cx="17" cy="14" r="2.5" fill="#16161c"/>
                    <defs>
                        <linearGradient id="logo_paint_l" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#6366f1" />
                            <stop offset="1" stop-color="#a855f7" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1 style="font-size: 2.25rem; font-weight: 800; letter-spacing: -0.06em; margin-bottom: 0.5rem; color: #ffffff;">Payro</h1>
            <p style="color: var(--text-secondary); font-size: 0.85rem; font-weight: 600;">Intelligence for modern organizations.</p>
        </div>

        {% if error %}
        <div style="background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.2); color: #f87171; padding: 0.85rem; border-radius: 12px; font-size: 0.8rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.6rem;">
            <span style="font-size: 1.1rem;">⚠</span> {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="input-group" style="margin-bottom: 1.5rem;">
                <label style="display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.6rem; color: var(--text-secondary);">Access Identity</label>
                <input type="email" name="email" placeholder="admin@payro.com" required style="width: 100%; padding: 0.85rem; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 12px; color: white; outline: none;">
            </div>
            
            <div class="input-group" style="margin-bottom: 2.5rem;">
                <label style="display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.6rem; color: var(--text-secondary);">Security Key</label>
                <input type="password" name="password" placeholder="••••••••" required style="width: 100%; padding: 0.85rem; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 12px; color: white; outline: none;">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; border-radius: 12px; font-weight: 800; font-size: 0.9rem;">
                Establish Connection ✦
            </button>
        </form>

        <div style="margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--glass-border); text-align: center;">
            <p style="font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;">
                Secure Terminal • Audit Node Active
            </p>
        </div>
    </div>
</div>
{% endblock %}
