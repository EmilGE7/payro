{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card glass shadow-premium">
        <h1 class="logo" style="text-align: center; margin-bottom: 2rem;">Sign In</h1>
        <form action="{{ url_for('login') }}" method="POST">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary">Login to Dashboard</button>
        </form>
        <div style="margin-top: 2rem; padding: 1rem; font-size: 0.8rem; color: var(--text-secondary); border-top: 1px solid var(--glass-border);">
            <p><strong>Local Auth Enabled</strong></p>
            <p>Use your account credentials to log in.</p>
        </div>
    </div>
</div>
{% endblock %}
