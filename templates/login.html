{% extends "base.html" %}
{% block title %}Executive Login{% endblock %}

{% block auth_content %}
<div class="login-container fadeInUp">
    <div class="login-card glass aurora-hover">
        <!-- Brand Header -->
        <div style="text-align: center; margin-bottom: 3.5rem;">
            <div style="display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px; background: #ffffff; color: #000000; border-radius: 12px; font-size: 1.5rem; margin-bottom: 1.25rem; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
                💼
            </div>
            <h1 style="font-size: 1.75rem; font-weight: 800; letter-spacing: -0.06em; margin-bottom: 0.5rem; color: #ffffff;">Payro Console</h1>
            <p style="color: var(--text-secondary); font-size: 0.85rem; font-weight: 500;">Intelligence for modern organizations.</p>
        </div>

        {% if error %}
        <div style="background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.2); color: #f87171; padding: 0.85rem; border-radius: 12px; font-size: 0.8rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.6rem;">
            <span style="font-size: 1.1rem;">⚠</span> {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="input-group" style="margin-bottom: 1.5rem;">
                <label style="display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.6rem; color: var(--text-secondary);">Access Identity</label>
                <input type="email" name="email" placeholder="admin@payro.com" required>
            </div>
            
            <div class="input-group" style="margin-bottom: 2.5rem;">
                <label style="display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.6rem; color: var(--text-secondary);">Security Key</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.9rem;">
                Establish Connection ✦
            </button>
        </form>

        <div style="margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--glass-border); text-align: center;">
            <p style="font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;">
                Secure Terminal • Audit Node Active
            </p>
        </div>
    </div>
</div>
{% endblock %}
